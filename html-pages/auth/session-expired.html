<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Session Expired - CareerAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }

      .modal-content {
        background: white;
        border-radius: 16px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        max-width: 400px;
        width: 90%;
        padding: 0;
        overflow: hidden;
      }

      .modal-header {
        background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        color: white;
        padding: 24px;
        text-align: center;
      }

      .modal-body {
        padding: 24px;
      }

      .modal-footer {
        padding: 16px 24px 24px;
        border-top: 1px solid #e5e7eb;
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <div class="modal-content">
      <!-- Modal Header -->
      <div class="modal-header">
        <div class="flex justify-center mb-4">
          <div
            class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center"
          >
            <i data-lucide="clock" class="w-6 h-6"></i>
          </div>
        </div>
        <h2 class="text-xl font-bold">Session Expired</h2>
      </div>

      <!-- Modal Body -->
      <div class="modal-body">
        <p class="text-gray-600 text-center mb-4">
          For your security, please log in again to continue.
        </p>

        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
          <div class="flex items-start">
            <i
              data-lucide="info"
              class="w-5 h-5 text-blue-600 mt-0.5 mr-3 flex-shrink-0"
            ></i>
            <div>
              <p class="text-sm text-blue-800 font-medium mb-1">
                Your changes are saved automatically when possible.
              </p>
              <p class="text-sm text-blue-700">
                Don't worry, you won't lose your work.
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <div class="flex gap-3">
          <button
            id="cancelBtn"
            class="flex-1 bg-white border border-gray-300 text-gray-700 py-2.5 px-4 rounded-lg font-medium hover:bg-gray-50 transition-colors"
          >
            Cancel
          </button>
          <a
            href="login.html"
            class="flex-1 bg-indigo-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-indigo-700 transition-colors text-center"
          >
            Log In
          </a>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      // Cancel button - could close modal or redirect
      document.getElementById('cancelBtn').addEventListener('click', () => {
        // In a real app, this might close the modal
        // For demo, redirect to dashboard
        window.location.href = 'dashboard-job_seekers.html';
      });
    </script>
  </body>
</html>
