<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - CareerForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .password-strength {
        height: 4px;
        background: #e5e7eb;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 4px;
      }
      .password-strength-fill {
        height: 100%;
        transition: width 0.3s ease;
      }
      .password-strength-weak {
        background: #ef4444;
        width: 33%;
      }
      .password-strength-medium {
        background: #f59e0b;
        width: 66%;
      }
      .password-strength-strong {
        background: #10b981;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div
          id="form-container"
          class="bg-white rounded-2xl shadow-2xl p-8 sm:p-12"
        >
          <!-- Header -->
          <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
              <div
                class="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold tracking-tighter text-lg"
              >
                CF
              </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">
              Set new password
            </h1>
            <p class="text-gray-600 text-sm">
              Choose a strong, new password for your account.
            </p>
          </div>

          <!-- Reset Password Form -->
          <form id="resetForm" class="space-y-4">
            <div>
              <label
                for="password"
                class="block text-sm font-medium text-gray-700 mb-1"
                >New Password</label
              >
              <input
                type="password"
                id="password"
                name="password"
                required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
              />
              <div class="password-strength">
                <div id="passwordStrength" class="password-strength-fill"></div>
              </div>
              <p id="passwordHint" class="text-xs text-gray-500 mt-1">
                Use at least 8 characters with letters, numbers, and symbols.
              </p>
            </div>

            <div>
              <label
                for="confirmPassword"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Confirm New Password</label
              >
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
              />
              <p id="confirmError" class="text-red-500 text-xs mt-1 hidden">
                Passwords do not match.
              </p>
            </div>

            <button
              type="submit"
              class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors"
            >
              Set New Password
            </button>
          </form>
        </div>

        <!-- Success Message -->
        <div
          id="successMessage"
          class="hidden bg-white rounded-2xl shadow-2xl p-8 sm:p-12 text-center"
        >
          <div class="flex justify-center mb-4">
            <div
              class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center"
            >
              <i data-lucide="check-circle-2" class="w-8 h-8"></i>
            </div>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">Password Reset!</h1>
          <p class="text-gray-600 text-sm mb-6">
            Your password has been successfully updated. You can now log in with
            your new password.
          </p>
          <a
            href="login.html"
            class="w-full bg-indigo-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-indigo-700 transition-colors"
          >
            Proceed to Log In
          </a>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      const formContainer = document.getElementById('form-container');
      const resetForm = document.getElementById('resetForm');
      const successMessage = document.getElementById('successMessage');

      const passwordInput = document.getElementById('password');
      const passwordStrength = document.getElementById('passwordStrength');
      const confirmInput = document.getElementById('confirmPassword');
      const confirmError = document.getElementById('confirmError');

      let passwordScore = 0;

      passwordInput.addEventListener('input', function () {
        const password = this.value;
        passwordScore = 0;
        if (password.length >= 8) passwordScore++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) passwordScore++;
        if (/[0-9]/.test(password)) passwordScore++;
        if (/[^A-Za-z0-9]/.test(password)) passwordScore++;

        passwordStrength.className = 'password-strength-fill';
        if (passwordScore <= 2)
          passwordStrength.classList.add('password-strength-weak');
        else if (passwordScore === 3)
          passwordStrength.classList.add('password-strength-medium');
        else if (passwordScore === 4)
          passwordStrength.classList.add('password-strength-strong');
      });

      resetForm.addEventListener('submit', function (e) {
        e.preventDefault();
        confirmError.classList.add('hidden');

        if (passwordInput.value !== confirmInput.value) {
          confirmError.classList.remove('hidden');
          return;
        }

        if (passwordScore < 3) {
          // Require at least medium strength
          alert('Password is too weak. Please choose a stronger password.');
          return;
        }

        formContainer.classList.add('hidden');
        successMessage.classList.remove('hidden');
      });
    </script>
  </body>
</html>
