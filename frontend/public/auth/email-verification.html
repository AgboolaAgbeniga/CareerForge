<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification - CareerForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div
        class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8 sm:p-12 text-center"
      >
        <!-- Icon -->
        <div class="flex justify-center mb-6">
          <div
            class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"
          >
            <i data-lucide="mail-check" class="w-8 h-8"></i>
          </div>
        </div>

        <!-- Header -->
        <h1 class="text-2xl font-bold text-gray-900 mb-2">
          Verify your email address
        </h1>
        <p class="text-gray-600 text-sm mb-6">
          We've sent a verification link to
          <strong id="userEmail" class="text-gray-800">user@example.com</strong
          >. Please click the link in the email to activate your account.
        </p>

        <!-- Actions -->
        <div class="space-y-4">
          <button
            id="resendBtn"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
          >
            Resend Verification Email
          </button>
          <a
            href="login.html"
            class="text-sm text-gray-600 hover:text-indigo-600 hover:underline font-medium"
          >
            Go back to Log In
          </a>
        </div>

        <!-- Helper Text -->
        <div class="text-center mt-8">
          <p class="text-xs text-gray-500">
            Didn't receive the email? Check your spam folder or wait a few
            minutes before resending.
          </p>
        </div>

        <!-- Toast Notification -->
        <div
          id="toast"
          class="hidden fixed bottom-5 right-5 bg-slate-900 text-white py-3 px-5 rounded-lg shadow-xl text-sm flex items-center gap-2"
        >
          <i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>
          <span>New verification email sent.</span>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      // Simulate getting email from a previous step
      const urlParams = new URLSearchParams(window.location.search);
      const email = urlParams.get('email') || 'user@example.com';
      document.getElementById('userEmail').textContent = email;

      // Resend button logic
      const resendBtn = document.getElementById('resendBtn');
      const toast = document.getElementById('toast');
      let toastTimeout;

      resendBtn.addEventListener('click', function () {
        if (resendBtn.disabled) return;

        resendBtn.disabled = true;
        resendBtn.textContent = 'Sending...';
        resendBtn.classList.add('opacity-75', 'cursor-not-allowed');

        // Simulate API call
        setTimeout(() => {
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend Verification Email';
          resendBtn.classList.remove('opacity-75', 'cursor-not-allowed');

          // Show toast
          toast.classList.remove('hidden');
          clearTimeout(toastTimeout);
          toastTimeout = setTimeout(() => {
            toast.classList.add('hidden');
          }, 4000);
        }, 2000);
      });
    </script>
  </body>
</html>
