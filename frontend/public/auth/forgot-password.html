<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - CareerForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-md">
        <div
          id="form-container"
          class="bg-white rounded-2xl shadow-2xl p-8 sm:p-12"
        >
          <!-- Header -->
          <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
              <div
                class="w-12 h-12 bg-slate-900 text-white rounded-xl flex items-center justify-center font-bold tracking-tighter text-lg"
              >
                CF
              </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">
              Reset your password
            </h1>
            <p class="text-gray-600 text-sm">
              No problem. Enter your email and we'll send you a reset link.
            </p>
          </div>

          <!-- Forgot Password Form -->
          <form id="forgotForm" class="space-y-4">
            <div>
              <label
                for="email"
                class="block text-sm font-medium text-gray-700 mb-1"
                >Email address</label
              >
              <input
                type="email"
                id="email"
                name="email"
                required
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="you@example.com"
              />
              <p id="emailError" class="text-red-500 text-xs mt-1 hidden">
                Please enter a valid email address.
              </p>
            </div>

            <button
              type="submit"
              class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors"
            >
              Send Reset Link
            </button>
          </form>

          <div class="text-center mt-6">
            <a
              href="login.html"
              class="text-sm text-indigo-600 hover:underline font-medium flex items-center justify-center gap-1"
            >
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Back to Log In
            </a>
          </div>
        </div>

        <!-- Success Message (replaces form) -->
        <div
          id="successMessage"
          class="hidden bg-white rounded-2xl shadow-2xl p-8 sm:p-12 text-center"
        >
          <div class="flex justify-center mb-4">
            <div
              class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center"
            >
              <i data-lucide="check-circle-2" class="w-8 h-8"></i>
            </div>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">
            Check your email
          </h1>
          <p class="text-gray-600 text-sm">
            We've sent a password reset link to the email address you provided.
            Please check your inbox and follow the instructions.
          </p>
          <div class="mt-8">
            <a
              href="login.html"
              class="text-sm text-indigo-600 hover:underline font-medium flex items-center justify-center gap-1"
            >
              <i data-lucide="arrow-left" class="w-4 h-4"></i>
              Back to Log In
            </a>
          </div>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();

      const formContainer = document.getElementById('form-container');
      const forgotForm = document.getElementById('forgotForm');
      const successMessage = document.getElementById('successMessage');
      const emailError = document.getElementById('emailError');

      forgotForm.addEventListener('submit', function (e) {
        e.preventDefault();
        emailError.classList.add('hidden');

        const email = forgotForm.email.value;
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          emailError.classList.remove('hidden');
          return;
        }

        // On successful submission, hide form and show success message
        formContainer.classList.add('hidden');
        successMessage.classList.remove('hidden');
      });
    </script>
  </body>
</html>
